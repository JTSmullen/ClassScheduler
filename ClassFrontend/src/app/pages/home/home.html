<h1>Welcome to the Home Page</h1>
<p>Checkout these buttons:</p>

<!-- <br>
</br> -->

<button (click)="toggleCreate()">Create New Schedule</button>

<div *ngIf="showCreate" class="dropdown">
  <form (submit)="createSchedule($event)">
    <input
      type="text"
      [(ngModel)]="scheduleName"
      name="scheduleName"
      placeholder="Enter schedule name"
      required
    />

    <button type="submit" [disabled]="loading">
      {{ loading ? 'Creating...' : 'Create' }}
    </button>
  </form>

  <p *ngIf="errorMessage" class="error">
    {{ errorMessage }}
  </p>
</div>

<button routerLink="/schedule">View Schedule</button>
