# 1. Update the URL with your actual Endpoint and DB Name
# Endpoint from your console: class-schduler-db.cpi4uo8o86gy.us-east-2.rds.amazonaws.com
# Database Name from your console: mysql
spring.datasource.url=jdbc:mysql://class-schduler-db.cpi4uo8o86gy.us-east-2.rds.amazonaws.com:3306/class_scheduler

# 2. Use your RDS Credentials (assuming password is correct)
spring.datasource.username=admin
spring.datasource.password=

# 3. Use the updated MySQL 8 Dialect
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# 4. Hibernate behavior
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
